<div class="min-h-screen bg-bg-light dark:bg-bg-dark flex items-center justify-center px-4">
  <div class="card max-w-sm w-full p-8">

    <h1 class="page-title text-center mb-6">{{ 'REGISTER.TITLE' | translate }}</h1>

    <!-- Error -->
    <div *ngIf="error" class="mb-4 flex items-center gap-2 rounded-lg bg-error/10 px-4 py-3 text-sm text-error">
      <lucide-icon name="alert-circle" [size]="16" aria-hidden="true"></lucide-icon>
      {{ error }}
    </div>

    <form (ngSubmit)="submit()" #registerForm="ngForm" novalidate class="space-y-4">

      <div>
        <label for="anzeigename" class="block text-sm font-medium text-text-light dark:text-text-dark mb-1">
          {{ 'REGISTER.NAME' | translate }} <span class="text-gray-400 font-normal">{{ 'REGISTER.NAME_OPTIONAL' | translate }}</span>
        </label>
        <input
          id="anzeigename"
          type="text"
          class="form-input w-full"
          [(ngModel)]="anzeigename"
          name="anzeigename"
          autocomplete="name"
          [placeholder]="'REGISTER.NAME_PLACEHOLDER' | translate"
        />
      </div>

      <div>
        <label for="email" class="block text-sm font-medium text-text-light dark:text-text-dark mb-1">
          {{ 'REGISTER.EMAIL' | translate }}
        </label>
        <input
          id="email"
          type="email"
          class="form-input w-full"
          [(ngModel)]="email"
          name="email"
          autocomplete="email"
          [placeholder]="'REGISTER.EMAIL_PLACEHOLDER' | translate"
          required
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-text-light dark:text-text-dark mb-1">
          {{ 'REGISTER.PASSWORD' | translate }}
          <span class="text-gray-400 font-normal text-xs ml-1">{{ 'REGISTER.PASSWORD_MIN' | translate }}</span>
        </label>
        <input
          id="password"
          type="password"
          class="form-input w-full"
          [(ngModel)]="password"
          name="password"
          autocomplete="new-password"
          placeholder="••••••••"
          required
          minlength="8"
        />
      </div>

      <button
        type="submit"
        class="btn-primary w-full justify-center"
        [disabled]="loading"
      >
        <lucide-icon *ngIf="loading" name="loader-2" [size]="16" class="animate-spin" aria-hidden="true"></lucide-icon>
        <span>{{ loading ? ('REGISTER.LOADING' | translate) : ('REGISTER.SUBMIT' | translate) }}</span>
      </button>

    </form>

    <p class="mt-6 text-center text-sm text-gray-500 dark:text-gray-400">
      {{ 'REGISTER.ALREADY_REGISTERED' | translate }}
      <a routerLink="/login" class="text-accent hover:underline font-medium">{{ 'REGISTER.SIGN_IN_LINK' | translate }}</a>
    </p>

  </div>
</div>
