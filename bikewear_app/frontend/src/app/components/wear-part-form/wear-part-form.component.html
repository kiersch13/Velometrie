<div class="card border-t-2 border-accent rounded-t-none mb-6">
  <div class="p-5">
    <h4 class="text-sm font-semibold text-primary dark:text-text-dark mb-4 flex items-center gap-2">
      <lucide-icon name="tag" [size]="14" class="text-accent" aria-hidden="true"></lucide-icon>
      {{ 'WEAR_PART_FORM.TITLE' | translate }}
    </h4>

    <div *ngIf="error" class="flex items-center gap-2 mb-4 p-3 bg-error/10 border border-error/20 rounded-xl text-error text-sm">
      <lucide-icon name="alert-circle" [size]="14" aria-hidden="true"></lucide-icon>
      {{ error }}
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
      <div class="flex flex-col gap-1 relative">
        <label class="text-xs font-semibold text-gray-500 dark:text-text-dark">{{ 'WEAR_PART_FORM.NAME' | translate }}</label>
        <input
          type="text"
          [(ngModel)]="part.name"
          (input)="onNameInput()"
          (keydown)="onNameKeydown($event)"
          (blur)="onNameBlur()"
          placeholder="z.B. Continental GP5000"
          class="form-input"
          autocomplete="off"
        />
        <!-- Autocomplete dropdown -->
        <ul
          *ngIf="showSuggestions"
          class="absolute z-50 top-full left-0 right-0 mt-1 bg-white dark:bg-bg-dark border border-gray-200 dark:border-gray-700 rounded-xl shadow-card overflow-hidden"
        >
          <li
            *ngFor="let s of suggestions; let i = index"
            (mousedown)="selectSuggestion(s)"
            class="flex items-center gap-3 px-4 py-2.5 cursor-pointer text-sm transition-colors"
            [class.bg-accent]="i === activeSuggestionIndex"
            [class.text-white]="i === activeSuggestionIndex"
            [class.hover:bg-gray-50]="i !== activeSuggestionIndex"
            [class.dark:hover:bg-gray-800]="i !== activeSuggestionIndex"
          >
            <lucide-icon name="tag" [size]="12" class="shrink-0 opacity-60" aria-hidden="true"></lucide-icon>
            <span class="flex-1 truncate">
              <span class="font-medium">{{ s.hersteller }}</span>&nbsp;{{ s.name }}
            </span>
            <span class="text-xs opacity-60 shrink-0">{{ 'WEAR_CATEGORIES.' + s.kategorie | translate }}</span>
          </li>
        </ul>
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-gray-500 dark:text-text-dark">{{ 'WEAR_PART_FORM.CATEGORY' | translate }}</label>
        <select [(ngModel)]="part.kategorie" (ngModelChange)="onKategorieChange()" class="form-input">
          <option *ngFor="let cat of categories" [value]="cat">{{ 'WEAR_CATEGORIES.' + cat | translate }}</option>
        </select>
      </div>
    </div>

    <!-- Position dropdown for Reifen and Kettenblatt -->
    <div *ngIf="showPositionDropdown" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-gray-500 dark:text-text-dark">
          {{ 'WEAR_PART_FORM.POSITION' | translate }}
          <span class="font-normal text-gray-400 ml-1">{{ 'WEAR_PART_FORM.POSITION_OPTIONAL' | translate }}</span>
        </label>
        <select [(ngModel)]="part.position" (ngModelChange)="onPositionChange()" class="form-input">
          <option [ngValue]="null">{{ 'WEAR_PART_FORM.NO_POSITION' | translate }}</option>
          <option *ngFor="let pos of currentPositions" [value]="pos">{{ pos }}</option>
        </select>
      </div>
      <!-- Checkbox: also mount on other wheel (Reifen only) -->
      <div *ngIf="otherWheelLabel" class="flex items-end pb-1">
        <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-600 dark:text-text-dark select-none">
          <input
            type="checkbox"
            [(ngModel)]="mountOnOtherWheel"
            class="w-4 h-4 rounded border-gray-300 text-accent focus:ring-accent"
          />
          {{ otherWheelLabel }}
        </label>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-gray-500 dark:text-text-dark flex items-center gap-1.5">
          {{ 'WEAR_PART_FORM.INSTALL_KM' | translate }}
          <lucide-icon *ngIf="loadingOdometer" name="loader-2" [size]="12" class="animate-spin text-accent" aria-hidden="true"></lucide-icon>
        </label>
        <input type="number" [(ngModel)]="part.einbauKilometerstand" min="0" class="form-input" [disabled]="loadingOdometer" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-gray-500 dark:text-text-dark">{{ 'WEAR_PART_FORM.INSTALL_DATE' | translate }}</label>
        <input type="date" [(ngModel)]="einbauDatumStr" class="form-input" />
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-5">
      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-gray-500 dark:text-text-dark">
          {{ 'WEAR_PART_FORM.REMOVAL_KM' | translate }}
          <span class="font-normal text-gray-400 ml-1">{{ 'WEAR_PART_FORM.REMOVAL_KM_OPTIONAL' | translate }}</span>
        </label>
        <input type="number" [(ngModel)]="part.ausbauKilometerstand" min="0" class="form-input" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-gray-500 dark:text-text-dark">
          {{ 'WEAR_PART_FORM.REMOVAL_DATE' | translate }}
          <span class="font-normal text-gray-400 ml-1">{{ 'WEAR_PART_FORM.REMOVAL_DATE_OPTIONAL' | translate }}</span>
        </label>
        <input type="date" [(ngModel)]="ausbauDatumStr" class="form-input" />
      </div>
    </div>

    <!-- Reifen-spezifische Felder -->
    <div *ngIf="part.kategorie === WearPartCategory.Reifen" class="mb-5">
      <p class="text-xs font-semibold text-gray-500 dark:text-text-dark mb-3 flex items-center gap-1.5">
        <lucide-icon name="circle" [size]="12" class="text-accent" aria-hidden="true"></lucide-icon>
        {{ 'WEAR_PART_FORM.TYRE_CONFIG' | translate }}
        <span class="font-normal text-gray-400">{{ 'WEAR_PART_FORM.TYRE_CONFIG_OPTIONAL' | translate }}</span>
      </p>
      <div class="grid grid-cols-2 gap-3 mb-3">
        <div class="flex flex-col gap-1">
          <label class="text-xs font-semibold text-gray-500 dark:text-text-dark">{{ 'WEAR_PART_FORM.WIDTH_MM' | translate }}</label>
          <input type="number" [(ngModel)]="part.reifenBreiteMm" (ngModelChange)="onReifenBreiteMmChange()" min="0" class="form-input" placeholder="z.B. 28" />
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-xs font-semibold text-gray-500 dark:text-text-dark">{{ 'WEAR_PART_FORM.WIDTH_INCH' | translate }}</label>
          <input type="number" [(ngModel)]="part.reifenBreiteZoll" (ngModelChange)="onReifenBreiteZollChange()" min="0" step="0.1" class="form-input" placeholder="z.B. 1.1" />
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div class="flex flex-col gap-1">
          <label class="text-xs font-semibold text-gray-500 dark:text-text-dark">{{ 'WEAR_PART_FORM.PRESSURE_BAR' | translate }}</label>
          <input type="number" [(ngModel)]="part.reifenDruckBar" (ngModelChange)="onReifenDruckBarChange()" min="0" step="0.1" class="form-input" placeholder="z.B. 5.0" />
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-xs font-semibold text-gray-500 dark:text-text-dark">{{ 'WEAR_PART_FORM.PRESSURE_PSI' | translate }}</label>
          <input type="number" [(ngModel)]="part.reifenDruckPsi" (ngModelChange)="onReifenDruckPsiChange()" min="0" class="form-input" placeholder="z.B. 73" />
        </div>
      </div>
    </div>

    <!-- Federung: Fahrstunden -->
    <div *ngIf="part.kategorie === WearPartCategory.Federung" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-5">
      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-gray-500 dark:text-text-dark">
          {{ 'WEAR_PART_FORM.FEDERUNG_INSTALL_HOURS' | translate }}
          <span class="font-normal text-gray-400 ml-1">{{ 'WEAR_PART_FORM.OPTIONAL' | translate }}</span>
        </label>
        <input type="number" [(ngModel)]="part.einbauFahrstunden" min="0" step="0.1" class="form-input" placeholder="z.B. 42.5" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-gray-500 dark:text-text-dark">
          {{ 'WEAR_PART_FORM.FEDERUNG_REMOVAL_HOURS' | translate }}
          <span class="font-normal text-gray-400 ml-1">{{ 'WEAR_PART_FORM.OPTIONAL' | translate }}</span>
        </label>
        <input type="number" [(ngModel)]="part.ausbauFahrstunden" min="0" step="0.1" class="form-input" />
      </div>
    </div>

    <!-- Indoor ignorieren -->
    <div class="flex items-center gap-2 mb-5">
      <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-600 dark:text-text-dark select-none">
        <input
          type="checkbox"
          [(ngModel)]="part.indoorIgnorieren"
          class="w-4 h-4 rounded border-gray-300 text-accent focus:ring-accent"
        />
        {{ 'WEAR_PART_FORM.INDOOR_IGNORE' | translate }}
      </label>
      <span class="text-xs text-gray-400">{{ 'WEAR_PART_FORM.INDOOR_IGNORE_HINT' | translate }}</span>
    </div>

    <!-- Notizen -->
    <div class="flex flex-col gap-1 mb-5">
      <label class="text-xs font-semibold text-gray-500 dark:text-text-dark">
        {{ 'WEAR_PART_FORM.NOTES' | translate }}
        <span class="font-normal text-gray-400 ml-1">{{ 'WEAR_PART_FORM.NOTES_OPTIONAL' | translate }}</span>
      </label>
      <textarea [(ngModel)]="part.notizen" rows="3" class="form-input resize-none" [placeholder]="'WEAR_PART_FORM.NOTES_PLACEHOLDER' | translate"></textarea>
    </div>

    <div class="pt-4 border-t border-gray-100 dark:border-gray-700">
      <button class="btn-primary" (click)="save()" [disabled]="saving">
        <lucide-icon *ngIf="saving" name="loader-2" [size]="14" class="animate-spin" aria-hidden="true"></lucide-icon>
        {{ saving ? ('WEAR_PART_FORM.SAVING' | translate) : ('WEAR_PART_FORM.SAVE' | translate) }}
      </button>
    </div>
  </div>
</div>
